name: 收盤日報

on:
  schedule:
    # 台灣時間 13:45（UTC 05:45），週一到週五
    - cron: "45 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 發送日報
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode daily-report

      - name: 更新 Dashboard 狀態
        run: |
          git config user.name "rebalance-bot"
          git config user.email "bot@github.com"
          git add docs/data/state.json
          git diff --staged --quiet || git commit -m "chore: update portfolio state (daily)"
          git push
