<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>再平衡監控 Dashboard</title>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
      --blue: #58a6ff; --accent: #1f6feb; --orange: #e3b341;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; padding: 16px;
    }

    /* ── 密碼保護 ── */
    #auth-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .auth-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 36px 28px;
      width: min(360px, 90vw); text-align: center;
    }
    .auth-box h2 { font-size: 1.1rem; margin-bottom: 8px; }
    .auth-box p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
    .auth-box input {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem; margin-bottom: 12px;
    }
    .auth-box input:focus { outline: none; border-color: var(--accent); }
    .auth-box button {
      width: 100%; padding: 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    .auth-box button:hover { background: #388bfd; }
    .auth-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

    /* ── Dashboard ── */
    #dashboard { display: none; max-width: 480px; margin: 0 auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 10px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--text); }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px;
    }
    .card-title-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .card-title-row .card-title { margin-bottom: 0; }

    /* ── 即時報價 ── */
    .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
    .price-big { font-size: 2.2rem; font-weight: 700; }
    .price-change { font-size: 0.9rem; }
    .price-meta { color: var(--muted); font-size: 0.78rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-live { background: var(--green); animation: pulse 1.5s infinite; }
    .dot-closed { background: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── 持倉設定 ── */
    .settings-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .field label {
      display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px;
    }
    .field input {
      width: 100%; padding: 9px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.9rem;
    }
    .field input:focus { outline: none; border-color: var(--accent); }
    .save-btn {
      width: 100%; padding: 10px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600;
    }
    .save-btn:hover { background: #388bfd; }
    .save-ok { color: var(--green); font-size: 0.78rem; text-align: center; margin-top: 8px; min-height: 18px; }

    /* ── 持倉上下兩區塊 ── */
    .pos-section { padding: 14px 0; }
    .pos-section:first-of-type { padding-top: 0; }
    .pos-section-label {
      font-size: 0.75rem; font-weight: 700; color: var(--blue);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px;
    }
    .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
    .pos-inputs { display: flex; flex-direction: column; gap: 8px; }
    .field-sm label {
      display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 4px;
    }
    .field-sm input {
      width: 100%; padding: 7px 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.85rem;
    }
    .field-sm input:focus { outline: none; border-color: var(--accent); }
    .pos-stats { display: flex; flex-direction: column; gap: 10px; }
    .stat-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
    .stat-value { font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
    .stat-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .mini-bar   { height: 4px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width .35s ease; }
    .section-divider { border: none; border-top: 1px solid var(--border); margin: 0 -20px; }

    /* ── 持倉列表 ── */
    .pos-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .pos-row:last-child { border-bottom: none; }
    .pos-name { font-weight: 600; font-size: 0.92rem; }
    .pos-sub  { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
    .pos-val  { font-weight: 600; text-align: right; }
    .pos-wt   { color: var(--muted); font-size: 0.78rem; margin-top: 2px; text-align: right; }

    /* ── 模擬工具 ── */
    .sim-label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .sim-price-display { font-size: 1.4rem; font-weight: 700; color: var(--orange); }
    .sim-pct {
      font-size: 0.85rem; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; background: rgba(227,179,65,0.15); color: var(--orange);
    }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 6px;
      background: var(--border); border-radius: 3px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: var(--orange); cursor: pointer;
    }
    .sim-marks {
      display: flex; justify-content: space-between;
      color: var(--muted); font-size: 0.7rem; margin-top: 4px;
    }
    .sim-banner {
      display: flex; align-items: center; gap: 6px;
      background: rgba(227,179,65,0.12); border: 1px solid rgba(227,179,65,0.3);
      border-radius: 8px; padding: 8px 12px; margin-top: 12px;
      font-size: 0.82rem; color: var(--orange);
    }
    .sim-reset {
      margin-left: auto; background: none; border: 1px solid rgba(227,179,65,0.4);
      color: var(--orange); padding: 2px 10px; border-radius: 10px;
      font-size: 0.75rem; cursor: pointer;
    }

    /* ── Beta 量表 ── */
    .beta-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .beta-big { font-size: 2.2rem; font-weight: 700; }
    .beta-meta { color: var(--muted); font-size: 0.8rem; line-height: 1.7; }
    .beta-meta span { display: block; }
    .gauge-track {
      position: relative; height: 10px; border-radius: 5px;
      background: linear-gradient(to right, var(--green) 0%, var(--yellow) 50%, var(--red) 100%);
      margin-bottom: 6px;
    }
    .gauge-safe {
      position: absolute; top: 0; height: 10px;
      background: rgba(255,255,255,.15); border-radius: 5px;
    }
    .gauge-needle {
      position: absolute; top: -5px; width: 4px; height: 20px;
      background: #fff; border-radius: 2px; transform: translateX(-50%);
      transition: left .35s ease;
    }
    .gauge-labels {
      display: flex; justify-content: space-between;
      color: var(--muted); font-size: 0.7rem;
    }

    /* ── 再平衡狀態 ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.83rem; font-weight: 600; margin-bottom: 12px;
    }
    .s-normal { background: rgba(63,185,80,.15); color: var(--green); }
    .s-sell   { background: rgba(248,81,73,.15); color: var(--red); }
    .s-buy    { background: rgba(63,185,80,.15); color: var(--green); }
    .rebal-box {
      background: var(--bg); border-radius: 8px;
      padding: 12px 14px; font-size: 0.87rem; line-height: 1.9;
    }
    .rebal-box .lbl { color: var(--muted); }
    .rebal-box .val { font-weight: 600; }

    .footer { text-align: center; color: var(--muted); font-size: 0.73rem; margin: 20px 0 8px; }

    /* ── 手動輸入股價 ── */
    .price-edit-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 3px 9px; border-radius: 6px; cursor: pointer; font-size: 0.78rem;
      margin-left: 10px; vertical-align: middle;
    }
    .price-edit-btn:hover { color: var(--text); border-color: var(--text); }
    .manual-row {
      display: flex; gap: 8px; margin-top: 10px; align-items: center;
    }
    .manual-row input {
      flex: 1; padding: 8px 12px; background: var(--bg);
      border: 1px solid var(--accent); border-radius: 8px;
      color: var(--text); font-size: 1rem;
    }
    .manual-row input:focus { outline: none; }
    .manual-row .ok-btn {
      padding: 8px 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer;
    }
    .manual-row .cancel-btn {
      padding: 8px 10px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-size: 0.88rem; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ══ 密碼保護 ══ -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>🔒 再平衡監控</h2>
    <p>請輸入密碼以進入 Dashboard</p>
    <input type="password" id="pwd-input" placeholder="密碼" autocomplete="current-password" />
    <button onclick="checkPassword()">進入</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ══ 主 Dashboard ══ -->
<div id="dashboard">
  <header>
    <h1>📊 再平衡監控</h1>
    <button class="icon-btn" onclick="refreshPrice()">↺ 更新報價</button>
  </header>

  <!-- 即時報價 -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">即時報價</div>
      <span id="market-status-dot"></span>
    </div>
    <div class="price-row">
      <div class="price-big" id="price-display">—</div>
      <div class="price-change" id="price-change"></div>
      <button class="price-edit-btn" onclick="toggleManualEdit()" title="手動輸入">✏️ 手動</button>
    </div>
    <div class="manual-row" id="manual-row" style="display:none">
      <input type="number" id="manual-price-input" step="0.01" min="0.01" placeholder="輸入今日股價" />
      <button class="ok-btn" onclick="applyManualPrice()">確認</button>
      <button class="cancel-btn" onclick="toggleManualEdit()">取消</button>
    </div>
    <div class="price-meta" id="price-meta">載入中…</div>
  </div>

  <!-- 持倉設定 -->
  <div class="card">
    <div class="card-title">持倉設定</div>

    <!-- ▲ 正二區塊 -->
    <div class="pos-section">
      <div class="pos-section-label">📈 台灣50正2（00631L）</div>
      <div class="pos-grid">
        <div class="pos-inputs">
          <div class="field-sm">
            <label>持有股數（股）</label>
            <input type="number" id="s-shares" min="0" step="1" oninput="updateSettingsStats()" />
          </div>
          <div class="field-sm">
            <label>持有成本（元 / 股）</label>
            <input type="number" id="s-cost" min="0" step="0.01" placeholder="平均成本" oninput="updateSettingsStats()" />
          </div>
        </div>
        <div class="pos-stats">
          <div>
            <div class="stat-label">配置比例</div>
            <div class="stat-value" id="stat-stock-pct">—</div>
            <div class="mini-bar"><div class="mini-bar-fill" id="bar-stock" style="background:var(--accent)"></div></div>
          </div>
          <div>
            <div class="stat-label">未實現損益</div>
            <div class="stat-value" id="stat-pnl">—</div>
            <div class="stat-sub" id="stat-pnl-sub">請輸入持有成本</div>
          </div>
        </div>
      </div>
    </div>

    <hr class="section-divider" />

    <!-- ▼ 現金區塊 -->
    <div class="pos-section">
      <div class="pos-section-label">💵 現金部位</div>
      <div class="pos-grid">
        <div class="pos-inputs">
          <div class="field-sm">
            <label>現金台幣（元）</label>
            <input type="number" id="s-cash" min="0" step="1000" oninput="updateSettingsStats()" />
          </div>
        </div>
        <div class="pos-stats">
          <div>
            <div class="stat-label">配置比例</div>
            <div class="stat-value" id="stat-cash-pct">—</div>
            <div class="mini-bar"><div class="mini-bar-fill" id="bar-cash" style="background:var(--blue)"></div></div>
          </div>
          <div>
            <div class="stat-label">較上次紀錄</div>
            <div class="stat-value" id="stat-cash-change">—</div>
          </div>
        </div>
      </div>
    </div>

    <hr class="section-divider" />

    <!-- 其他參數 -->
    <div style="padding-top:14px">
      <div class="settings-grid">
        <div class="field">
          <label>目標配置比例（%）</label>
          <input type="number" id="s-alloc" min="1" max="99" step="1" />
        </div>
        <div class="field">
          <label>偏離閾值（±%）</label>
          <input type="number" id="s-threshold" min="1" max="50" step="1" />
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>股票 Beta（正二為 2.0）</label>
          <input type="number" id="s-beta" min="0.1" max="5" step="0.1" />
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">儲存設定</button>
    <div class="save-ok" id="save-ok"></div>
  </div>

  <!-- 持倉現況 -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">持倉現況</div>
      <span id="sim-tag" style="display:none;font-size:0.72rem;color:var(--orange);font-weight:600;">⚡ 模擬中</span>
    </div>
    <div id="positions-list"></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
      <span style="font-weight:600">總資產</span>
      <span style="font-weight:700" id="total-value">—</span>
    </div>
  </div>

  <!-- 模擬工具 -->
  <div class="card">
    <div class="card-title">模擬工具（假設股價變動）</div>
    <div class="sim-label-row">
      <div>
        <div style="font-size:0.78rem;color:var(--muted);margin-bottom:3px">模擬後股價</div>
        <div class="sim-price-display" id="sim-price">—</div>
      </div>
      <div class="sim-pct" id="sim-pct-badge">0%</div>
    </div>
    <input type="range" id="sim-slider" min="-30" max="30" step="1" value="0"
           oninput="onSimChange(this.value)" />
    <div class="sim-marks">
      <span>−30%</span><span>−20%</span><span>−10%</span><span>0</span>
      <span>+10%</span><span>+20%</span><span>+30%</span>
    </div>
    <div class="sim-banner" id="sim-banner" style="display:none">
      ⚡ 模擬模式：以下數據為假設股價計算結果
      <button class="sim-reset" onclick="resetSim()">重設</button>
    </div>
  </div>

  <!-- Portfolio Beta -->
  <div class="card">
    <div class="card-title">Portfolio Beta</div>
    <div class="beta-row">
      <div class="beta-big" id="beta-current">—</div>
      <div class="beta-meta">
        <span>目標 <b id="beta-target">—</b></span>
        <span>偏離 <b id="beta-deviation">—</b></span>
        <span>區間 <b id="beta-range">—</b></span>
      </div>
    </div>
    <div class="gauge-track">
      <div class="gauge-safe" id="gauge-safe"></div>
      <div class="gauge-needle" id="gauge-needle"></div>
    </div>
    <div class="gauge-labels">
      <span id="g-lo">—</span><span>目標</span><span id="g-hi">—</span>
    </div>
  </div>

  <!-- 再平衡建議 -->
  <div class="card">
    <div class="card-title">再平衡建議</div>
    <div id="status-badge-wrap"></div>
    <div class="rebal-box" id="rebal-detail"></div>
  </div>

  <!-- 每日投資紀錄 -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">每日投資紀錄</div>
      <span style="font-size:0.72rem;color:var(--muted)" id="records-count"></span>
    </div>
    <div id="records-list">
      <div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:16px">載入中…</div>
    </div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
/* ════════════════════════════════════════
   密碼保護
════════════════════════════════════════ */
const PASSWORD_HASH = "52f2aabb94542cae2d424b73665c3c2af06771ad84bdff07fcc25732825502be";
const SESSION_KEY   = "xian_auth";

async function sha256(t) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function checkPassword() {
  const pwd = document.getElementById("pwd-input").value;
  if (await sha256(pwd) === PASSWORD_HASH) {
    sessionStorage.setItem(SESSION_KEY, "1");
    boot();
  } else {
    document.getElementById("auth-error").textContent = "密碼錯誤，請再試一次。";
  }
}
document.getElementById("pwd-input").addEventListener("keydown", e => { if (e.key==="Enter") checkPassword(); });

/* ════════════════════════════════════════
   設定（localStorage）
════════════════════════════════════════ */
const SETTINGS_KEY = "xian_portfolio";
const DEFAULTS = { shares: 1000, cashTwd: 200000, costPerShare: 0, stockBeta: 2.0, targetAllocation: 60, threshold: 10 };

function loadSettings() {
  try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}")); }
  catch { return { ...DEFAULTS }; }
}
function saveSettings() {
  const s = {
    shares:          parseFloat(document.getElementById("s-shares").value)    || DEFAULTS.shares,
    cashTwd:         parseFloat(document.getElementById("s-cash").value)      || DEFAULTS.cashTwd,
    costPerShare:    parseFloat(document.getElementById("s-cost").value)      || 0,
    stockBeta:       parseFloat(document.getElementById("s-beta").value)      || DEFAULTS.stockBeta,
    targetAllocation:parseFloat(document.getElementById("s-alloc").value)     || DEFAULTS.targetAllocation,
    threshold:       parseFloat(document.getElementById("s-threshold").value) || DEFAULTS.threshold,
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  settings = s;
  recalcAndRender();
  const ok = document.getElementById("save-ok");
  ok.textContent = "✅ 已儲存";
  setTimeout(() => ok.textContent = "", 2000);
}
function fillSettingsUI(s) {
  document.getElementById("s-shares").value    = s.shares;
  document.getElementById("s-cash").value      = s.cashTwd;
  document.getElementById("s-cost").value      = s.costPerShare || "";
  document.getElementById("s-beta").value      = s.stockBeta;
  document.getElementById("s-alloc").value     = s.targetAllocation ?? DEFAULTS.targetAllocation;
  document.getElementById("s-threshold").value = s.threshold;
}

/* ════════════════════════════════════════
   即時報價
════════════════════════════════════════ */
let currentPrice = 0;
let marketOpen   = false;
const PRICE_CACHE_KEY = "xian_price_cache";

// 依台灣時間判斷是否開盤中（09:00–13:30，週一到週五）
// 不依賴 API 的 z 欄位，因為開盤初期 z 可能是 "-"（尚無成交）
function isTaiwanMarketOpen() {
  const tp   = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Taipei" }));
  const day  = tp.getDay();
  const mins = tp.getHours() * 60 + tp.getMinutes();
  return day >= 1 && day <= 5 && mins >= 9 * 60 && mins < 13 * 60 + 30;
}

// 先從 localStorage 快取還原，讓畫面不要空白
function restoreCachedPrice() {
  try {
    const c = JSON.parse(localStorage.getItem(PRICE_CACHE_KEY) || "{}");
    if (c.price > 0) {
      currentPrice = c.price;
      const age    = Math.round((Date.now() - (c.ts || 0)) / 60000);
      const isOpen = isTaiwanMarketOpen();
      updatePriceUI(c.price, c.prev ?? null, isOpen ? "REGULAR" : "CLOSED", `快取（${age} 分鐘前）`);
    }
  } catch { /* 略 */ }
}

async function fetchPrice() {
  document.getElementById("price-meta").textContent = "抓取中…";

  // ── 方法 1：TWSE 官方即時 API（透過 allorigins 解決 CORS）──
  try {
    const twseUrl = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_00631L.tw&_=${Date.now()}`;
    const proxy   = `https://api.allorigins.win/raw?url=${encodeURIComponent(twseUrl)}`;
    const r = await fetch(proxy, { cache: "no-store" });
    const d = await r.json();
    const m = d?.msgArray?.[0];
    if (m) {
      // z = 即時成交（開盤初期可能是 "-"），pz = 最新成交，y = 昨收
      const rawZ  = m.z  && m.z  !== "-" ? m.z  : null;
      const rawPz = m.pz && m.pz !== "-" ? m.pz : null;
      const rawY  = m.y  && m.y  !== "-" ? m.y  : null;
      const price = parseFloat(rawZ || rawPz || rawY || "0");
      const prev  = parseFloat(rawY || "0");
      const isOpen   = isTaiwanMarketOpen();   // 依台灣時間，非依 API 欄位
      const hasLive  = !!rawZ;
      if (price > 0) {
        currentPrice = price;
        marketOpen   = isOpen;
        const src = isOpen
          ? (hasLive ? "TWSE 即時" : "TWSE 盤中（尚無成交，以昨收計）")
          : "TWSE 收盤";
        saveAndRenderPrice(price, prev, isOpen ? "REGULAR" : "CLOSED", src);
        return;
      }
    }
  } catch (e) { console.warn("TWSE fetch 失敗:", e); }

  // ── 方法 2：Yahoo Finance（透過 allorigins）──
  try {
    const yUrl  = "https://query1.finance.yahoo.com/v8/finance/chart/00631L.TW?interval=1d&range=5d";
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`;
    const r = await fetch(proxy, { cache: "no-store" });
    const d = await r.json();
    const meta = d?.chart?.result?.[0]?.meta;
    if (meta?.regularMarketPrice > 0) {
      const price  = meta.regularMarketPrice;
      const prev   = meta.chartPreviousClose ?? meta.previousClose ?? 0;
      const isOpen = isTaiwanMarketOpen();
      currentPrice = price;
      marketOpen   = isOpen;
      saveAndRenderPrice(price, prev, isOpen ? "REGULAR" : "CLOSED", "Yahoo Finance");
      return;
    }
  } catch (e) { console.warn("Yahoo fetch 失敗:", e); }

  // ── 方法 3：GitHub Actions 上次寫入的 state.json ──
  try {
    const r = await fetch("data/state.json?t=" + Date.now());
    const d = await r.json();
    const price = d.portfolio?.positions?.[0]?.price ?? 0;
    if (price > 0) {
      currentPrice = price;
      saveAndRenderPrice(price, null, "CLOSED", "⚠️ Actions 快取（可能非今日）");
      return;
    }
  } catch { /* 略 */ }

  document.getElementById("price-meta").textContent = "❌ 無法取得報價，請手動輸入";
}

function saveAndRenderPrice(price, prev, state, source) {
  localStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ price, prev, ts: Date.now() }));
  updatePriceUI(price, prev, state, source);
}

function updatePriceUI(price, prev, state, source) {
  document.getElementById("price-display").textContent = `$${price.toFixed(2)}`;
  const dotEl = document.getElementById("market-status-dot");
  if (state === "REGULAR") {
    dotEl.innerHTML = `<span class="dot dot-live"></span><span style="font-size:.72rem;color:var(--green)">盤中</span>`;
  } else {
    dotEl.innerHTML = `<span class="dot dot-closed"></span><span style="font-size:.72rem;color:var(--muted)">收盤</span>`;
  }
  if (prev && prev > 0) {
    const chg = price - prev;
    const pct = chg / prev * 100;
    const el  = document.getElementById("price-change");
    el.textContent = `${chg >= 0 ? "+" : ""}${chg.toFixed(2)} (${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%)`;
    el.style.color = chg >= 0 ? "var(--green)" : "var(--red)";
  }
  const now = new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" });
  document.getElementById("price-meta").textContent = `00631L 台灣50正2 ｜ ${source} ｜ 更新：${now}`;
}

// ── 手動輸入 ──
function toggleManualEdit() {
  const row = document.getElementById("manual-row");
  const visible = row.style.display !== "none";
  row.style.display = visible ? "none" : "flex";
  if (!visible) {
    const inp = document.getElementById("manual-price-input");
    inp.value = currentPrice > 0 ? currentPrice : "";
    inp.focus();
  }
}
function applyManualPrice() {
  const val = parseFloat(document.getElementById("manual-price-input").value);
  if (!val || val <= 0) return;
  currentPrice = val;
  saveAndRenderPrice(val, null, "CLOSED", "手動輸入");
  document.getElementById("manual-row").style.display = "none";
  recalcAndRender();
}
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("manual-row").style.display !== "none") applyManualPrice();
});

async function refreshPrice() {
  await fetchPrice();
  recalcAndRender();
}

/* ════════════════════════════════════════
   持倉設定即時統計
════════════════════════════════════════ */
let prevDayRecord = null; // 上一筆日報紀錄（從 records.json 載入）

function updateSettingsStats() {
  if (!currentPrice || currentPrice <= 0) return;

  const shares = parseFloat(document.getElementById("s-shares").value) || 0;
  const cost   = parseFloat(document.getElementById("s-cost").value)   || 0;
  const cash   = parseFloat(document.getElementById("s-cash").value)   || 0;

  const stockValue = shares * currentPrice;
  const total      = stockValue + cash;
  const stockPct   = total > 0 ? stockValue / total * 100 : 0;
  const cashPct    = total > 0 ? cash / total * 100 : 0;

  // 配置比例
  document.getElementById("stat-stock-pct").textContent = stockPct.toFixed(1) + "%";
  document.getElementById("bar-stock").style.width = Math.min(stockPct, 100) + "%";
  document.getElementById("stat-cash-pct").textContent  = cashPct.toFixed(1) + "%";
  document.getElementById("bar-cash").style.width  = Math.min(cashPct, 100) + "%";

  // 未實現損益
  if (cost > 0 && shares > 0) {
    const pnl    = (currentPrice - cost) * shares;
    const pnlPct = (currentPrice - cost) / cost * 100;
    const s1     = pnl >= 0 ? "+" : "";
    const col    = pnl >= 0 ? "var(--green)" : "var(--red)";
    document.getElementById("stat-pnl").innerHTML =
      `<span style="color:${col}">${s1}${fmt(pnl)}</span>`;
    document.getElementById("stat-pnl-sub").innerHTML =
      `<span style="color:${col}">${s1}${pnlPct.toFixed(2)}%</span>`
      + `<span style="color:var(--muted)"> ｜均成本 $${cost.toFixed(2)}</span>`;
  } else {
    document.getElementById("stat-pnl").textContent     = "—";
    document.getElementById("stat-pnl-sub").textContent = "請輸入持有成本";
  }

  // 較上次紀錄現金水位
  const prevCash = prevDayRecord?.cash ?? 0;
  if (prevCash > 0) {
    const diff  = cash - prevCash;
    const sign  = diff >= 0 ? "+" : "";
    const col   = diff >= 0 ? "var(--green)" : "var(--red)";
    document.getElementById("stat-cash-change").innerHTML =
      `<span style="color:${col}">${sign}${fmt(diff)}</span>`
      + `<div class="stat-sub" style="margin-top:2px;color:var(--muted)">vs ${prevDayRecord.date} ${fmt(prevCash)}</div>`;
  } else {
    document.getElementById("stat-cash-change").textContent = "尚無紀錄可比較";
  }
}

/* ════════════════════════════════════════
   計算引擎（純前端）
════════════════════════════════════════ */
let settings = {};
let simPct = 0;

function calcPortfolio(shares, cashTwd, price, stockBeta) {
  const stockValue = shares * price;
  const total      = stockValue + cashTwd;
  const sw = total > 0 ? stockValue / total : 0;
  const cw = total > 0 ? cashTwd / total : 0;
  return { stockValue, cashTwd, total, stockWeight: sw, cashWeight: cw,
           beta: parseFloat((sw * stockBeta).toFixed(4)) };
}

function calcRebalance(portfolio, targetAllocation, thresholdPct, price) {
  const targetAlloc    = targetAllocation / 100;
  const targetStockAmt = Math.round(portfolio.total * targetAlloc);  // Step 2
  const adjustment     = Math.round(targetStockAmt - portfolio.stockValue); // Step 3 (+ 買進 / - 賣出)
  const adjShares      = price > 0 ? Math.round(Math.abs(adjustment) / price) : 0;

  const currentAlloc = portfolio.stockWeight;
  const threshold    = thresholdPct / 100;
  const upper        = parseFloat((targetAlloc * (1 + threshold)).toFixed(4));
  const lower        = parseFloat((targetAlloc * (1 - threshold)).toFixed(4));
  const devPct       = targetAlloc > 0
    ? parseFloat(((currentAlloc - targetAlloc) / targetAlloc * 100).toFixed(2))
    : 0;
  const status = currentAlloc > upper ? "sell" : currentAlloc < lower ? "buy" : "normal";

  return {
    targetAlloc, targetStockAmt,
    currentStockValue: Math.round(portfolio.stockValue),
    adjustment, adjShares,
    status,
    action: status === "sell" ? "SELL" : status === "buy" ? "BUY" : null,
    devPct, currentAlloc, upper, lower,
  };
}

/* ════════════════════════════════════════
   模擬工具
════════════════════════════════════════ */
function onSimChange(val) {
  simPct = parseFloat(val);
  recalcAndRender();
}
function resetSim() {
  simPct = 0;
  document.getElementById("sim-slider").value = 0;
  recalcAndRender();
}

/* ════════════════════════════════════════
   渲染
════════════════════════════════════════ */
function fmt(v) { return "$" + Math.round(v).toLocaleString("zh-TW"); }

function recalcAndRender() {
  if (!currentPrice || !settings.shares) return;

  const simPrice  = parseFloat((currentPrice * (1 + simPct / 100)).toFixed(2));
  const isSim     = simPct !== 0;
  const usePrice  = isSim ? simPrice : currentPrice;
  const portfolio = calcPortfolio(settings.shares, settings.cashTwd, usePrice, settings.stockBeta);
  const rebal     = calcRebalance(portfolio, settings.targetAllocation ?? DEFAULTS.targetAllocation, settings.threshold, usePrice);
  const targetBeta = parseFloat(((settings.targetAllocation ?? DEFAULTS.targetAllocation) / 100 * settings.stockBeta).toFixed(4));

  // 模擬器 UI
  document.getElementById("sim-price").textContent = `$${simPrice.toFixed(2)}`;
  const sign = simPct > 0 ? "+" : "";
  document.getElementById("sim-pct-badge").textContent = `${sign}${simPct}%`;
  document.getElementById("sim-banner").style.display  = isSim ? "flex" : "none";
  document.getElementById("sim-tag").style.display     = isSim ? "inline" : "none";
  document.getElementById("sim-pct-badge").style.color = simPct < 0 ? "var(--red)" : simPct > 0 ? "var(--green)" : "var(--orange)";
  document.getElementById("sim-pct-badge").style.background = simPct < 0 ? "rgba(248,81,73,.12)" : simPct > 0 ? "rgba(63,185,80,.12)" : "rgba(227,179,65,.12)";

  // 持倉列表
  const stockLabel = `${settings.shares.toLocaleString()} 股 × $${usePrice.toFixed(2)}`;
  document.getElementById("positions-list").innerHTML = `
    <div class="pos-row">
      <div><div class="pos-name">台灣50正2（00631L）</div><div class="pos-sub">${stockLabel}</div></div>
      <div><div class="pos-val">${fmt(portfolio.stockValue)}</div><div class="pos-wt">${(portfolio.stockWeight*100).toFixed(1)}%</div></div>
    </div>
    <div class="pos-row">
      <div><div class="pos-name">現金</div><div class="pos-sub">台幣存款</div></div>
      <div><div class="pos-val">${fmt(portfolio.cashTwd)}</div><div class="pos-wt">${(portfolio.cashWeight*100).toFixed(1)}%</div></div>
    </div>`;
  document.getElementById("total-value").textContent = fmt(portfolio.total);

  // Beta 量表（顯示範圍：targetBeta ±33%）
  const betaColor = rebal.status === "sell" ? "var(--red)" : rebal.status === "buy" ? "var(--green)" : "var(--text)";
  const betaEl = document.getElementById("beta-current");
  betaEl.textContent = portfolio.beta.toFixed(3);
  betaEl.style.color = betaColor;
  document.getElementById("beta-target").textContent    = targetBeta;
  document.getElementById("beta-deviation").textContent = (rebal.devPct >= 0 ? "+" : "") + rebal.devPct.toFixed(2) + "% 配置";
  document.getElementById("beta-range").textContent     = `${(rebal.lower*100).toFixed(0)}%～${(rebal.upper*100).toFixed(0)}% 正二`;

  const gMin = parseFloat((targetBeta * 0.67).toFixed(2));
  const gMax = parseFloat((targetBeta * 1.33).toFixed(2));
  const toPct = v => Math.max(0, Math.min(100, (v - gMin) / (gMax - gMin) * 100));
  document.getElementById("g-lo").textContent = gMin;
  document.getElementById("g-hi").textContent = gMax;
  document.getElementById("gauge-safe").style.left  = toPct(rebal.lower * settings.stockBeta) + "%";
  document.getElementById("gauge-safe").style.width = (toPct(rebal.upper * settings.stockBeta) - toPct(rebal.lower * settings.stockBeta)) + "%";
  document.getElementById("gauge-needle").style.left = toPct(portfolio.beta) + "%";

  // 再平衡建議（三步驟，永遠顯示）
  const badgeMap = {
    normal: ["s-normal", "✅ 配置正常，無需操作"],
    sell:   ["s-sell",   "🔴 觸發！正二比例過高，建議賣出"],
    buy:    ["s-buy",    "🟢 觸發！正二比例過低，建議買進"],
  };
  const [bcls, blabel] = badgeMap[rebal.status];
  document.getElementById("status-badge-wrap").innerHTML =
    `<div class="status-badge ${bcls}">${blabel}</div>`;

  const targetPct = (settings.targetAllocation ?? 60).toFixed(0);
  const cashPct   = (100 - parseFloat(targetPct)).toFixed(0);
  const adjSign   = rebal.adjustment >= 0 ? "+" : "−";
  const adjColor  = rebal.adjustment > 0 ? "var(--green)" : rebal.adjustment < 0 ? "var(--red)" : "var(--text)";
  const adjLabel  = rebal.adjustment > 0 ? "（需買進）" : rebal.adjustment < 0 ? "（需賣出）" : "（已平衡）";
  const adjVerb   = rebal.adjustment > 0 ? "買進" : "賣出";

  document.getElementById("rebal-detail").innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
      <span class="lbl">Step 1　總資產</span>
      <span class="val">${fmt(portfolio.total)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
      <span class="lbl">Step 2　目標正二金額（${targetPct}%）</span>
      <span class="val">${fmt(rebal.targetStockAmt)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
      <span class="lbl">　　　　目前正二市值（${(rebal.currentAlloc*100).toFixed(1)}%）</span>
      <span class="val">${fmt(rebal.currentStockValue)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:1rem">
      <span class="lbl"><b>Step 3　調整金額</b>${adjLabel}</span>
      <span style="font-weight:700;color:${adjColor}">${adjSign}${fmt(Math.abs(rebal.adjustment))}</span>
    </div>
    ${rebal.action ? `
    <div style="background:var(--card);border-radius:8px;padding:10px 12px;margin-top:4px;font-size:0.85rem;line-height:1.9;border:1px solid var(--border)">
      <div>建議 <b>${adjVerb}</b> 00631L 約 <b>${rebal.adjShares.toLocaleString()} 股</b>（@$${usePrice.toFixed(2)}）</div>
      <div style="color:var(--muted)">執行後：${targetPct}% 正二 / ${cashPct}% 現金</div>
    </div>` : `
    <div style="color:var(--muted);font-size:0.8rem;margin-top:4px">
      偏離未超過 ±${settings.threshold}%，Telegram 不觸發通知
    </div>`}
  `;

  updateSettingsStats();

  // 頁底
  const now = new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" });
  document.getElementById("footer").textContent = `計算時間：${now}`;
}

/* ════════════════════════════════════════
   每日投資紀錄
════════════════════════════════════════ */
async function loadRecords() {
  try {
    const r = await fetch("data/records.json?t=" + Date.now());
    const d = await r.json();
    renderRecords(d.records || []);
  } catch {
    document.getElementById("records-list").innerHTML =
      '<div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:16px">尚無紀錄</div>';
  }
}

function renderRecords(records) {
  const el = document.getElementById("records-list");
  if (!records.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:16px">收盤後自動記錄，明日起可查閱</div>';
    return;
  }

  // 儲存最近一筆供持倉設定「較上次紀錄」使用
  prevDayRecord = records[records.length - 1];
  updateSettingsStats();

  document.getElementById("records-count").textContent = `共 ${records.length} 筆`;

  // 最新在上
  const rev = [...records].reverse();
  let rows = "";
  for (let i = 0; i < rev.length; i++) {
    const rec  = rev[i];
    const prev = rev[i + 1];                   // 前一個（較舊）
    const isLast = i === rev.length - 1;

    let changeHtml = '<span style="color:var(--muted);font-size:0.75rem">—</span>';
    if (prev && prev.total > 0) {
      const chg    = rec.total - prev.total;
      const pct    = (chg / prev.total * 100).toFixed(2);
      const sign   = chg >= 0 ? "+" : "";
      const color  = chg >= 0 ? "var(--green)" : "var(--red)";
      const arrow  = chg >= 0 ? "▲" : "▼";
      changeHtml   = `<span style="color:${color};font-size:0.78rem">${arrow} ${sign}${fmt(chg)}（${sign}${pct}%）</span>`;
    }

    const adjLabel = rec.adjustment > 0 ? `需買進 ${fmt(rec.adjustment)}`
                   : rec.adjustment < 0 ? `需賣出 ${fmt(Math.abs(rec.adjustment))}`
                   : "已平衡";
    const adjColor = rec.adjustment > 0 ? "var(--green)" : rec.adjustment < 0 ? "var(--red)" : "var(--muted)";

    rows += `
      <div style="padding:10px 0;${isLast ? "" : "border-bottom:1px solid var(--border)"}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1">
            <div style="font-weight:600;font-size:0.88rem">${rec.date}</div>
            <div style="color:var(--muted);font-size:0.73rem;margin-top:3px;line-height:1.6">
              正二 ${rec.stock_pct}% / 現金 ${rec.cash_pct}% ｜ @$${rec.price.toFixed(2)} ｜ Beta ${rec.beta}
            </div>
            <div style="color:${adjColor};font-size:0.73rem;margin-top:1px">${adjLabel}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;font-size:0.95rem">${fmt(rec.total)}</div>
            <div style="margin-top:3px">${changeHtml}</div>
          </div>
        </div>
      </div>`;
  }
  el.innerHTML = rows;
}

/* ════════════════════════════════════════
   啟動
════════════════════════════════════════ */
async function boot() {
  document.getElementById("auth-overlay").style.display = "none";
  document.getElementById("dashboard").style.display    = "block";
  settings = loadSettings();
  fillSettingsUI(settings);
  restoreCachedPrice();  // 先顯示快取，不讓畫面空白
  recalcAndRender();
  await Promise.all([fetchPrice(), loadRecords()]);
  recalcAndRender();
  // 每 60 秒自動更新報價（盤中期間有意義）
  setInterval(async () => {
    await fetchPrice();
    recalcAndRender();
  }, 60000);
}

if (sessionStorage.getItem(SESSION_KEY) === "1") { boot(); }
